<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Game Hunter Pro</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: #c9d1d9; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 15px; border-radius: 8px; }
        .key { color: #d29922; font-weight: bold; font-family: monospace; border: 1px dashed; padding: 5px; display: block; margin: 10px 0; }
        .btn { background: #238636; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>
    <h1>🎮 STEAM KEYS & FREE GAMES</h1>
    <div id="status">Buscando ofertas...</div>
    <div id="game-grid" class="grid"></div>

<script>
    // Lista de proxies para rotar si uno falla
    const PROXIES = [
        "https://api.allorigins.win/get?url=",
        "https://thingproxy.freeboard.io/fetch/"
    ];

    async function fetchData(url, proxyIndex = 0) {
        try {
            const response = await fetch(PROXIES[proxyIndex] + encodeURIComponent(url));
            if (!response.ok) throw new Error();
            const data = await response.json();
            return JSON.parse(data.contents);
        } catch (e) {
            if (proxyIndex < PROXIES.length - 1) {
                console.log("Rotando proxy...");
                return fetchData(url, proxyIndex + 1);
            }
            throw e;
        }
    }

    async function init() {
        const grid = document.getElementById('game-grid');
        const status = document.getElementById('status');
        try {
            const data = await fetchData('https://www.reddit.com/r/FreeGameFindings/new.json?limit=30');
            status.innerText = "Ofertas actualizadas";
            grid.innerHTML = data.data.children.map(item => {
                const d = item.data;
                const keyMatch = d.title.match(/[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}/);
                return `
                    <div class="card">
                        <h3>${d.title}</h3>
                        ${keyMatch ? `<span class="key">${keyMatch[0]}</span>` : ''}
                        <a href="${d.url}" target="_blank" class="btn">Ir a la oferta</a>
                    </div>
                `;
            }).join('');
        } catch (e) {
            status.innerText = "Error: Los servidores intermedios están ocupados. Refresca en 10 segundos.";
        }
    }
    init();
</script>
</body>
</html>
