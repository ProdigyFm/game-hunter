<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hunter Pro | Buscador de Keys</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --primary: #58a6ff;
            --key-color: #d29922;
            --free-color: #238636;
            --text: #c9d1d9;
        }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .container { max-width: 1000px; width: 100%; }
        header { text-align: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h1 { color: var(--primary); margin-bottom: 5px; font-size: 2.5rem; }
        #status { font-size: 0.9rem; color: #8b949e; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; 
            padding: 20px; display: flex; flex-direction: column; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.4); }

        .badge {
            font-size: 0.75rem; font-weight: 800; padding: 4px 12px; border-radius: 6px;
            margin-bottom: 15px; width: fit-content; text-transform: uppercase;
        }
        .badge-key { background: var(--key-color); color: #000; }
        .badge-free { background: var(--free-color); color: #fff; }

        .title { font-weight: 600; font-size: 1.1rem; line-height: 1.4; margin-bottom: 15px; flex-grow: 1; }
        
        .key-box {
            background: #000; border: 2px dashed var(--key-color); border-radius: 8px;
            padding: 15px; margin-bottom: 15px; text-align: center; cursor: pointer;
            transition: background 0.2s;
        }
        .key-box:hover { background: #1a1a1a; }
        .key-code { color: var(--key-color); font-family: 'Courier New', monospace; font-size: 1.3rem; font-weight: bold; letter-spacing: 1px; }
        .key-hint { display: block; font-size: 0.7rem; color: #8b949e; margin-top: 8px; font-weight: bold; }

        .footer-info { font-size: 0.8rem; color: #8b949e; display: flex; justify-content: space-between; margin-top: 10px; }
        .btn { 
            background: var(--primary); color: #0d1117; font-weight: 700; text-align: center;
            padding: 12px; border-radius: 8px; text-decoration: none; margin-top: 20px;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }

        .loader { 
            width: 48px; height: 48px; border: 4px solid #30363d; border-top-color: var(--primary);
            border-radius: 50%; animation: spin 1s infinite linear; margin: 30px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎮 Game Hunter Pro</h1>
        <div id="status">Escaneando bases de datos de Reddit...</div>
        <div id="loader" class="loader"></div>
    </header>

    <div id="game-grid" class="grid"></div>
</div>

<script>
    // Proxy estable para evitar bloqueos de CORS
    const PROXY = "https://api.allorigins.win/raw?url=";
    
    // Función para detectar el formato XXXXX-XXXXX-XXXXX
    function extractKey(text) {
        const regex = /[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}/gi;
        const found = text.match(regex);
        return found ? found[0].toUpperCase() : null;
    }

    async function scan() {
        const grid = document.getElementById('game-grid');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');

        const feeds = [
            'https://www.reddit.com/r/GameDeals/new.json?limit=50',
            'https://www.reddit.com/r/FreeGameFindings/new.json?limit=50'
        ];

        try {
            let posts = [];
            for (const url of feeds) {
                const response = await fetch(PROXY + encodeURIComponent(url));
                if (!response.ok) throw new Error();
                const json = await response.json();
                posts = [...posts, ...json.data.children];
            }

            // Filtrar juegos gratis o menciones de Keys
            const deals = posts.filter(p => {
                const t = p.data.title.toLowerCase();
                return (t.includes('100%') || t.includes('free') || t.includes('key')) && !t.includes('expired');
            });

            loader.style.display = 'none';
            status.innerText = `Análisis completo: ${deals.length} oportunidades detectadas.`;
            grid.innerHTML = '';

            deals.forEach(item => {
                const d = item.data;
                const foundKey = extractKey(d.title) || extractKey(d.selftext || "");
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="badge ${foundKey ? 'badge-key' : 'badge-free'}">
                        ${foundKey ? '🔑 Steam Key Detectada' : '🎁 Juego Gratis'}
                    </div>
                    <div class="title">${d.title}</div>
                    
                    ${foundKey ? `
                        <div class="key-box" onclick="copyKey('${foundKey}', this)">
                            <span class="key-code">${foundKey}</span>
                            <span class="key-hint">Haz clic para copiar código</span>
                        </div>
                    ` : ''}

                    <div class="footer-info">
                        <span>📍 ${d.domain}</span>
                        <span>💬 ${d.num_comments} comentarios</span>
                    </div>
                    <a href="${d.url}" target="_blank" class="btn">RECLAMAR AHORA</a>
                `;
                grid.appendChild(card);
            });

        } catch (e) {
            loader.style.display = 'none';
            status.innerHTML = "<b>Error de conexión local detectado.</b><br>Sube este archivo a GitHub Pages para que funcione correctamente.";
        }
    }

    // Función para copiar al portapapeles
    function copyKey(code, el) {
        navigator.clipboard.writeText(code);
        const hint = el.querySelector('.key-hint');
        const originalText = hint.innerText;
        hint.innerText = "¡COPIADO!";
        hint.style.color = "#ffffff";
        setTimeout(() => {
            hint.innerText = originalText;
            hint.style.color = "#8b949e";
        }, 2000);
    }

    scan();
</script>

</body>
</html>
